<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ubuntu HOWTO Install Guide</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0c0c0c, #1a1a2e);
      color: #00ff88;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
    }
    .container {
      background: rgba(0, 255, 136, 0.1);
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
    }
    h1 {
      text-align: center;
      text-shadow: 0 0 10px #00ff88;
    }
    .package-card {
      margin-bottom: 20px;
      background: rgba(0, 255, 136, 0.05);
      border: 1px solid #00ff88;
      border-radius: 10px;
      transition: all 0.3s ease;
    }
    .package-card:hover {
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
    }
    .install-cmd {
      background-color: rgba(0, 0, 0, 0.5);
      color: #00ff88;
      padding: 10px;
      border-radius: 5px;
      font-family: monospace;
      word-wrap: break-word;
      border: 1px solid #00ff88;
    }
    .copy-btn {
      margin-top: 10px;
      background: #00ff88;
      color: #000;
      border: none;
    }
    .copy-btn:hover {
      background: #00cc66;
    }
    .progress {
      margin-top: 10px;
    }
    .ai-search {
      margin-bottom: 30px;
      background: rgba(0, 255, 136, 0.1);
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #00ff88;
    }
    .ai-input {
      background: rgba(0, 0, 0, 0.5);
      color: #00ff88;
      border: 1px solid #00ff88;
    }
    .ai-btn {
      background: #00ff88;
      color: #000;
      border: none;
    }
    .ai-btn:hover {
      background: #00cc66;
    }
    .ai-result {
      margin-top: 10px;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #00ff88;
    }
  </style>
</head>
<body>
  <div class="container mt-5">
    <h1 class="text-center mb-4">Ubuntu HOWTO Install Guide</h1>
    <div class="ai-search">
      <h3>AI-Powered Command Generator</h3>
      <div class="input-group mb-3">
        <input type="text" id="aiInput" class="form-control ai-input" placeholder="Enter package name...">
        <button class="btn ai-btn" onclick="generateCommand()">Generate with AI</button>
      </div>
      <div id="aiResult" class="ai-result" style="display: none;"></div>
    </div>
    <div class="mb-4">
      <input type="text" id="searchInput" class="form-control ai-input" placeholder="Search for packages...">
    </div>
    <div id="packageContainer" class="row">
      <!-- Package cards will be inserted here -->
    </div>
  </div>

  <script>
    const packages = [
      {
        name: "nodejs",
        description: "Node.js is a JavaScript runtime built on Chrome's V8 JavaScript engine.",
        installCmd: "curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash - && sudo apt-get install -y nodejs"
      },
      {
        name: "python3-pip",
        description: "Python package installer for Python 3.",
        installCmd: "sudo apt update && sudo apt install python3 python3-pip",
        hasInstall: true
      },
      {
        name: "git",
        description: "Git is a distributed version control system.",
        installCmd: "sudo apt update && sudo apt install git"
      },
      {
        name: "vim",
        description: "Vim is a highly configurable text editor.",
        installCmd: "sudo apt update && sudo apt install vim"
      },
      {
        name: "apache2",
        description: "Apache HTTP Server is a free and open-source cross-platform web server.",
        installCmd: "sudo apt update && sudo apt install apache2"
      },
      {
        name: "mysql-server",
        description: "MySQL is an open-source relational database management system.",
        installCmd: "sudo apt update && sudo apt install mysql-server"
      },
      {
        name: "docker",
        description: "Docker is a set of platform as a service products that use OS-level virtualization.",
        installCmd: "sudo apt update && sudo apt install apt-transport-https ca-certificates curl gnupg lsb-release && curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg && echo \"deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable\" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null && sudo apt update && sudo apt install docker-ce docker-ce-cli containerd.io"
      },
      {
        name: "vscode",
        description: "Visual Studio Code is a free source-code editor made by Microsoft.",
        installCmd: "wget -qO- https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > packages.microsoft.gpg && sudo install -o root -g root -m 644 packages.microsoft.gpg /etc/apt/trusted.gpg.d/ && sudo sh -c 'echo \"deb [arch=amd64,arm64,armhf signed-by=/etc/apt/trusted.gpg.d/packages.microsoft.gpg] https://packages.microsoft.com/repos/code stable main\" > /etc/apt/sources.list.d/vscode.list' && rm -f packages.microsoft.gpg && sudo apt update && sudo apt install code"
      },
      {
        name: "firefox",
        description: "Mozilla Firefox is a free and open-source web browser.",
        installCmd: "sudo apt update && sudo apt install firefox"
      },
      {
        name: "vlc",
        description: "VLC media player is a free and open-source, portable, cross-platform media player.",
        installCmd: "sudo apt update && sudo apt install vlc"
      }
    ];

    const packageContainer = document.getElementById('packageContainer');
    const searchInput = document.getElementById('searchInput');
    const aiInput = document.getElementById('aiInput');
    const aiResult = document.getElementById('aiResult');

    function createPackageCard(pkg) {
      const col = document.createElement('div');
      col.className = 'col-md-6 package-card';
      let installBtn = '';
      let progressBar = '';
      if (pkg.hasInstall) {
        installBtn = `<button class="btn btn-success install-btn" onclick="simulateInstall('${pkg.name}', this)">Install Now</button>`;
        progressBar = `<div class="progress" style="display: none;">
          <div class="progress-bar" role="progressbar" style="width: 0%"></div>
        </div>`;
      }
      col.innerHTML = `
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">${pkg.name}</h5>
            <p class="card-text">${pkg.description}</p>
            <div class="install-cmd">${pkg.installCmd}</div>
            <button class="btn copy-btn" onclick="copyToClipboard('${pkg.installCmd}')">Copy Command</button>
            ${installBtn}
            ${progressBar}
          </div>
        </div>
      `;
      return col;
    }

    function displayPackages(pkgs) {
      packageContainer.innerHTML = '';
      pkgs.forEach(pkg => {
        packageContainer.appendChild(createPackageCard(pkg));
      });
    }

    function filterPackages() {
      const query = searchInput.value.toLowerCase();
      const filtered = packages.filter(pkg =>
        pkg.name.toLowerCase().includes(query) ||
        pkg.description.toLowerCase().includes(query)
      );
      displayPackages(filtered);
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        alert('Command copied to clipboard!');
      }).catch(err => {
        console.error('Failed to copy: ', err);
      });
    }

    function simulateInstall(pkgName, btn) {
      const card = btn.closest('.card-body');
      const progressDiv = card.querySelector('.progress');
      const progressBar = card.querySelector('.progress-bar');
      progressDiv.style.display = 'block';
      btn.disabled = true;
      let progress = 0;
      const interval = setInterval(() => {
        progress += 10;
        progressBar.style.width = progress + '%';
        if (progress >= 100) {
          clearInterval(interval);
          alert(`${pkgName} installation simulated successfully!`);
          btn.disabled = false;
        }
      }, 500);
    }

    async function generateCommand() {
      const packageName = aiInput.value.trim();
      if (!packageName) {
        alert('Please enter a package name.');
        return;
      }
      aiResult.style.display = 'block';
      aiResult.innerHTML = 'Generating command with AI...';
      try {
        const response = await fetch('https://api-inference.huggingface.co/models/gpt2', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            inputs: `How to install ${packageName} on Ubuntu?`,
            parameters: {
              max_length: 100,
              temperature: 0.7
            }
          })
        });
        const data = await response.json();
        if (data && data[0] && data[0].generated_text) {
          const generated = data[0].generated_text.replace(`How to install ${packageName} on Ubuntu?`, '').trim();
          aiResult.innerHTML = `<strong>AI Generated Command:</strong><br><code>${generated}</code><br><button class="btn copy-btn" onclick="copyToClipboard('${generated}')">Copy Command</button>`;
        } else {
          aiResult.innerHTML = 'Failed to generate command. Try again.';
        }
      } catch (error) {
        aiResult.innerHTML = 'Error generating command. Please try again.';
        console.error(error);
      }
    }

    // Initial display
    displayPackages(packages);

    // Search functionality
    searchInput.addEventListener('input', filterPackages);
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
